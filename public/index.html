<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DOS/PLAY">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="/DosPlay/manifest.json">
<title>DOS/PLAY</title>
<link rel="stylesheet" href="/DosPlay/js-dos.css">
<script src="/DosPlay/js-dos.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

body {
  background: #0f1117;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* GAME AREA: takes all space above controls */
#game-wrap {
  flex: 1;
  min-height: 0;
  background: #000;
  position: relative;
}
#dos-root {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* js-dos fills its container, canvas pinned to top */
#dos-root > div {
  width: 100% !important;
  height: 100% !important;
  display: flex !important;
  align-items: flex-start !important;
}
#dos-root canvas {
  width: 100% !important;
  height: auto !important;
  max-height: 100%;
  object-fit: contain;
  object-position: top center;
  image-rendering: pixelated;
}

/* Hide js-dos sidebar/chrome — we have our own controls */
.jsdos-rso .sidebar,
.jsdos-rso .sidebar-thin,
.jsdos-rso .emulator-options { display: none !important; }

/* Launch screen sits inside game-wrap */
#launch {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0f1117;
  gap: 20px;
  padding: 24px;
  z-index: 10;
}
#launch.hidden { display: none; }
#launch h2 { color: #e2e8f0; font-size: 20px; }
#launch p  { color: #4a5568; font-size: 13px; text-align: center; }
#launch-btn {
  padding: 12px 28px;
  background: #1a2035;
  border: 1px solid #2a3050;
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
#launch-btn:active { background: #232d45; }
#err { color: #fc8181; font-size: 12px; text-align: center; display: none; }
#err.show { display: block; }

/* CONTROLS: fixed height at bottom */
#controls {
  flex-shrink: 0;
  background: #0f1117;
  border-top: 1px solid #1e2433;
}

/* Prevent double-tap zoom on entire controls area */
#controls, #controls * {
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

/* F-key row */
#frow {
  height: 52px;
  display: flex;
  align-items: center;
  overflow: hidden;
  border-bottom: 1px solid #1e2433;
}
#fscroll {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  overflow-x: auto;
  height: 100%;
  scrollbar-width: none;
}
#fscroll::-webkit-scrollbar { display: none; }
.fk {
  flex-shrink: 0;
  height: 36px;
  min-width: 44px;
  padding: 0 12px;
  background: #1a2035;
  border: 1px solid #1e2433;
  border-radius: 10px;
  color: #e2e8f0;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
}
.fk:active { background: #232d45; }
#type-btn { gap: 5px; padding: 0 14px; }

/* Tab row */
#tabs {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  border-bottom: 1px solid #1e2433;
}
.tab {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid transparent;
  color: #4a5568;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  white-space: nowrap;
}
.tab.on { background: #1a2035; border-color: #1e2433; color: #e2e8f0; }
.tab:active { background: #232d45; color: #e2e8f0; }
#tab-v { margin-left: auto; }

/* D-pad */
#dpad-wrap {
  height: 210px;
  display: flex;
  align-items: center;
  padding: 10px 12px;
  gap: 10px;
  overflow: hidden;
}
#dpad-wrap.hide { display: none; }

#action-col {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 76px;
  flex-shrink: 0;
}
.ab {
  height: 44px;
  background: #1a2035;
  border: 1px solid #1e2433;
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
}
.ab:active { background: #232d45; }

#dpad-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  flex: 1;
  height: 100%;
}
.dp {
  background: #1a2035;
  border: 1px solid #1e2433;
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  min-width: 0;
  min-height: 0;
}
.dp:active { background: #232d45; transform: scale(0.93); }
.dp-blank { background: transparent !important; border-color: transparent !important; }
.dp-mid   { background: #0f1117 !important; border-color: #0f1117 !important; color: #2a3050; font-size: 18px; }

/* Loading overlay */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,17,23,0.88);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
#loading.show { display: flex; }
.spin {
  width: 36px; height: 36px;
  border: 3px solid #1e2433;
  border-top-color: #e2e8f0;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#ltxt { color: #4a5568; font-size: 12px; letter-spacing: 2px; }

/* Toast */
#toast {
  position: fixed;
  bottom: 320px;
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1a2035;
  border: 1px solid #2a3050;
  color: #e2e8f0;
  font-size: 13px;
  padding: 7px 18px;
  border-radius: 20px;
  opacity: 0;
  pointer-events: none;
  z-index: 1000;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.2s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- GAME AREA (fills everything above controls) -->
<div id="game-wrap">
  <div id="dos-root"></div>
  <div id="launch">
    <div style="font-size:48px">💾</div>
    <h2>DOS/PLAY</h2>
    <p>Tap the button to load a game<br>.zip folder · .img disk · .exe file</p>
    <div id="launch-btn" onclick="document.getElementById('file-input').click()">⬆ Load Game</div>
    <div id="err"></div>
  </div>
</div>

<!-- CONTROLS (always visible below game) -->
<div id="controls">

  <div id="frow">
    <div id="fscroll">
      <div class="fk" id="type-btn" onclick="toggleKB()">⌨ Type</div>
      <div class="fk" onpointerdown="kd(this,'Escape',event)" onpointerup="ku(this,'Escape',event)">ESC</div>
      <div class="fk" onpointerdown="kd(this,'F1',event)"  onpointerup="ku(this,'F1',event)">F1</div>
      <div class="fk" onpointerdown="kd(this,'F2',event)"  onpointerup="ku(this,'F2',event)">F2</div>
      <div class="fk" onpointerdown="kd(this,'F3',event)"  onpointerup="ku(this,'F3',event)">F3</div>
      <div class="fk" onpointerdown="kd(this,'F4',event)"  onpointerup="ku(this,'F4',event)">F4</div>
      <div class="fk" onpointerdown="kd(this,'F5',event)"  onpointerup="ku(this,'F5',event)">F5</div>
      <div class="fk" onpointerdown="kd(this,'F6',event)"  onpointerup="ku(this,'F6',event)">F6</div>
      <div class="fk" onpointerdown="kd(this,'F7',event)"  onpointerup="ku(this,'F7',event)">F7</div>
      <div class="fk" onpointerdown="kd(this,'F8',event)"  onpointerup="ku(this,'F8',event)">F8</div>
      <div class="fk" onpointerdown="kd(this,'F9',event)"  onpointerup="ku(this,'F9',event)">F9</div>
      <div class="fk" onpointerdown="kd(this,'F10',event)" onpointerup="ku(this,'F10',event)">F10</div>
    </div>
  </div>

  <div id="tabs">
    <div class="tab on" id="tab-d" onclick="toggleDpad()">D-PAD</div>
    <div class="tab" onclick="saveState()">💾 Save</div>
    <div class="tab" onclick="loadState()">↩ Resume</div>
    <div class="tab" onclick="ejectGame()">⏏ Eject</div>
    <div class="tab" id="tab-v" onclick="toggleDpad()">▾</div>
  </div>

  <div id="dpad-wrap">
    <div id="action-col">
      <div class="ab" onpointerdown="kd(this,'Enter',event)"  onpointerup="ku(this,'Enter',event)">ENTER</div>
      <div class="ab" onpointerdown="kd(this,'Escape',event)" onpointerup="ku(this,'Escape',event)">ESC</div>
      <div class="ab" onpointerdown="kd(this,' ',event)"      onpointerup="ku(this,' ',event)">SPACE</div>
      <div class="ab" onpointerdown="kd(this,'Tab',event)"    onpointerup="ku(this,'Tab',event)">TAB</div>
    </div>
    <div id="dpad-grid">
      <div class="dp dp-blank"></div>
      <div class="dp" data-key="ArrowUp"    onpointerdown="kd(this,null,event)" onpointerup="ku(this,null,event)">↑ Up</div>
      <div class="dp dp-blank"></div>
      <div class="dp" data-key="ArrowLeft"  onpointerdown="kd(this,null,event)" onpointerup="ku(this,null,event)">← Left</div>
      <div class="dp dp-mid">🎮</div>
      <div class="dp" data-key="ArrowRight" onpointerdown="kd(this,null,event)" onpointerup="ku(this,null,event)">→ Right</div>
      <div class="dp dp-blank"></div>
      <div class="dp" data-key="ArrowDown"  onpointerdown="kd(this,null,event)" onpointerup="ku(this,null,event)">↓ Down</div>
      <div class="dp dp-blank"></div>
    </div>
  </div>

</div><!-- /controls -->

<input type="file" id="file-input" accept=".zip,.img,.ima,.exe,.com,.bat" style="display:none;position:fixed;top:-9999px;">
<div id="loading"><div class="spin"></div><div id="ltxt">LOADING</div></div>
<div id="toast"></div>

<script>
// ── Prevent double-tap zoom globally on iOS ─────────────────
(function() {
  let lastTap = 0;
  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTap < 350) {
      e.preventDefault();
    }
    lastTap = now;
  }, { passive: false });
})();

// ── SW (no auto-reload) ──────────────────────────────────────
if ('serviceWorker' in navigator)
  navigator.serviceWorker.register('/DosPlay/sw.js').catch(()=>{});

// ── File input ───────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadGame(e.target.files[0]);
  e.target.value = '';
});

// ── UI ───────────────────────────────────────────────────────
const loading = document.getElementById('loading');
const ltxt    = document.getElementById('ltxt');
const toastEl = document.getElementById('toast');
let toastTmr;

function showLoad(t) { ltxt.textContent = t; loading.classList.add('show'); }
function hideLoad()  { loading.classList.remove('show'); }
function showErr(m)  { const e=document.getElementById('err'); e.textContent=m; e.classList.add('show'); }
function hideErr()   { document.getElementById('err').classList.remove('show'); }
function toast(m)    {
  toastEl.textContent = m; toastEl.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => toastEl.classList.remove('show'), 2500);
}

// ── Tab toggle ───────────────────────────────────────────────
let dpadOpen = true;
function toggleDpad() {
  dpadOpen = !dpadOpen;
  document.getElementById('dpad-wrap').classList.toggle('hide', !dpadOpen);
  document.getElementById('tab-d').classList.toggle('on', dpadOpen);
  document.getElementById('tab-v').textContent = dpadOpen ? '▾' : '▸';
}

// ── Game load ────────────────────────────────────────────────
let dosInstance = null;
let ciInstance = null; // js-dos CommandInterface, set after ci-ready
let currentGameName = '';

async function loadGame(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['zip','img','ima','exe','com','bat'].includes(ext)) {
    showErr('Unsupported: .' + ext); return;
  }
  hideErr();
  showLoad('READING FILE');
  try {
    const buf = await file.arrayBuffer();
    await startDos(new Uint8Array(buf), ext, file.name);
  } catch(e) {
    hideLoad();
    showErr('Error: ' + (e.message || e));
    document.getElementById('launch').classList.remove('hidden');
  }
}

async function startDos(bytes, ext, name) {
  if (dosInstance) { try { await dosInstance.stop(); } catch(e){} dosInstance = null; }

  document.getElementById('launch').classList.add('hidden');
  document.getElementById('dos-root').innerHTML = '';

  showLoad('BUILDING BUNDLE');
  let bundle;
  if (ext === 'zip')                    bundle = await ensureJsdosBundle(bytes);
  else if (/exe|com|bat/.test(ext))     bundle = buildBundleFromExe(bytes, name);
  else                                  bundle = buildBundleFromFloppy(bytes);

  showLoad('STARTING DOSBOX');
  const blob = new Blob([bundle], { type: 'application/zip' });
  ciInstance = null;
  currentGameName = name;
  dosInstance = window.Dos(document.getElementById('dos-root'), {
    pathPrefix: '/DosPlay/emulators/',
    noCloud: true, noNetworking: true, workerThread: true,
    autoStart: true, kiosk: true, thinSidebar: true, renderAspect: '4/3',
    url: URL.createObjectURL(blob),
    onEvent: (event, ci) => {
      if (event === 'ci-ready') {
        ciInstance = ci;
        console.log('[DOS/PLAY] CI ready');
      }
    },
  });
  hideLoad();
  toast('▶ ' + name);
  // Fallback: poll for ci on dosInstance in case onEvent doesn't fire
  const ciPoll = setInterval(() => {
    if (ciInstance) { clearInterval(ciPoll); return; }
    const candidate = dosInstance && (dosInstance.ci || dosInstance._ci);
    if (candidate && typeof candidate.persist === 'function') {
      ciInstance = candidate;
      console.log('[DOS/PLAY] CI found via poll');
      clearInterval(ciPoll);
    }
  }, 1000);
  setTimeout(() => clearInterval(ciPoll), 30000);
}

async function ejectGame() {
  if (dosInstance) { try { await dosInstance.stop(); } catch(e){} dosInstance = null; }
  document.getElementById('dos-root').innerHTML = '';
  document.getElementById('launch').classList.remove('hidden');
  toast('Ejected.');
}

// ── Named saves via IndexedDB ────────────────────────────────
const DB_NAME = 'dosplay', DB_STORE = 'saves';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(val, key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  });
}
async function dbGetAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const store = tx.objectStore(DB_STORE);
    const keys = [], vals = [];
    store.openCursor().onsuccess = e => {
      const cur = e.target.result;
      if (cur) { keys.push(cur.key); vals.push(cur.value); cur.continue(); }
      else res(keys.map((k,i) => ({key:k, value:vals[i]})));
    };
    tx.onerror = () => rej(tx.error);
  });
}
async function dbDelete(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

// ── Save modal ───────────────────────────────────────────────
function saveState() {
  if (!ciInstance) { toast('Game not ready yet — wait a moment.'); return; }
  showSaveModal();
}
function loadState() {
  showLoadModal();
}

function showSaveModal() {
  const now = new Date();
  const defaultName = currentGameName
    ? currentGameName.replace(/\.[^.]+$/, '') + ' – ' + now.toLocaleDateString()
    : 'Save ' + now.toLocaleString();
  const modal = document.getElementById('save-modal');
  document.getElementById('save-name-input').value = defaultName;
  modal.style.display = 'flex';
  setTimeout(() => document.getElementById('save-name-input').select(), 50);
}

async function confirmSave() {
  const name = document.getElementById('save-name-input').value.trim();
  if (!name) { toast('Enter a name.'); return; }
  closeSaveModal();
  try {
    const data = await ciInstance.persist(false);
    if (!data) { toast('Nothing to save yet.'); return; }
    const meta = { name, date: new Date().toLocaleString(), game: currentGameName };
    await dbPut('save_' + Date.now(), { data, meta });
    toast('💾 Saved: ' + name);
  } catch(e) { toast('Save failed: ' + (e.message||e)); }
}
function closeSaveModal() {
  document.getElementById('save-modal').style.display = 'none';
}

async function showLoadModal() {
  const modal = document.getElementById('load-modal');
  const list = document.getElementById('load-save-list');
  list.innerHTML = '<div style="color:#4a5568;padding:20px;text-align:center">Loading...</div>';
  modal.style.display = 'flex';
  try {
    const saves = await dbGetAll();
    if (saves.length === 0) {
      list.innerHTML = '<div style="color:#4a5568;padding:20px;text-align:center">No saves yet.</div>';
      return;
    }
    saves.sort((a,b) => b.key.localeCompare(a.key));
    list.innerHTML = '';
    saves.forEach(function(item) {
      var key = item.key;
      var meta = item.value.meta;
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid #1e2433;';
      var nameDiv = document.createElement('div');
      nameDiv.style.cssText = 'flex:1;min-width:0;';
      var title = document.createElement('div');
      title.style.cssText = 'color:#e2e8f0;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      title.textContent = meta.name;
      var sub = document.createElement('div');
      sub.style.cssText = 'color:#4a5568;font-size:12px;margin-top:2px;';
      sub.textContent = (meta.game || '') + ' · ' + meta.date;
      nameDiv.appendChild(title);
      nameDiv.appendChild(sub);
      var loadBtn = document.createElement('button');
      loadBtn.textContent = 'Load';
      loadBtn.style.cssText = 'padding:6px 14px;background:#1a2035;border:1px solid #2a3050;border-radius:8px;color:#e2e8f0;font-size:13px;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0;';
      loadBtn.onpointerdown = function() { loadSave(key); };
      var delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.style.cssText = 'padding:6px 10px;background:transparent;border:1px solid #2a3050;border-radius:8px;color:#4a5568;font-size:13px;cursor:pointer;touch-action:manipulation;flex-shrink:0;';
      delBtn.onpointerdown = function() { deleteSave(key, row); };
      row.appendChild(nameDiv);
      row.appendChild(loadBtn);
      row.appendChild(delBtn);
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<div style="color:#fc8181;padding:20px">Error loading saves.</div>';
  }
}

function closeLoadModal() {
  document.getElementById('load-modal').style.display = 'none';
}

async function loadSave(key) {
  closeLoadModal();
  try {
    const record = await dbGet(key);
    if (!record) { toast('Save not found.'); return; }
    showLoad('LOADING SAVE');
    // record.data is stored as Uint8Array, retrieve as ArrayBuffer from IDB
    const bytes = record.data instanceof Uint8Array
      ? record.data
      : new Uint8Array(record.data);
    await startDos(bytes, 'zip', (record.meta.name || 'save') + '.jsdos');
    toast('Loaded: ' + record.meta.name);
  } catch(e) {
    hideLoad();
    toast('Load failed: ' + (e.message || e));
    console.error('loadSave error:', e);
  }
}

async function deleteSave(key, row) {
  if (!confirm('Delete this save?')) return;
  await dbDelete(key);
  if (row && row.parentNode) row.parentNode.removeChild(row);
  toast('Deleted.');
}

// ── Keys ─────────────────────────────────────────────────────
function getCanvas() {
  return document.querySelector('#dos-root canvas')
      || document.querySelector('#dos-root .emulator-canvas')
      || document.getElementById('dos-root');
}
const KC = {Enter:13,Escape:27,Tab:9,Backspace:8,' ':32,
  ArrowLeft:37,ArrowUp:38,ArrowRight:39,ArrowDown:40,
  F1:112,F2:113,F3:114,F4:115,F5:116,F6:117,F7:118,F8:119,F9:120,F10:121};
const CC = {Enter:'Enter',Escape:'Escape',Tab:'Tab',Backspace:'Backspace',' ':'Space',
  ArrowLeft:'ArrowLeft',ArrowUp:'ArrowUp',ArrowRight:'ArrowRight',ArrowDown:'ArrowDown'};

function fireKey(k, down) {
  const kc = KC[k] || k.toUpperCase().charCodeAt(0) || 0;
  const code = CC[k] || (k.length===1 ? 'Key'+k.toUpperCase() : k);
  const opts = {key:k, code, keyCode:kc, which:kc, bubbles:true, cancelable:true};
  const type = down ? 'keydown' : 'keyup';
  // js-dos v8 listens on window
  window.dispatchEvent(new KeyboardEvent(type, opts));
  // Also send to canvas as fallback
  const canvas = document.querySelector('#dos-root canvas');
  if (canvas) canvas.dispatchEvent(new KeyboardEvent(type, opts));
}
function kd(el, key, evt) {
  if (evt) { evt.preventDefault(); evt.stopPropagation(); }
  const k = key || el.dataset.key;
  el.style.opacity = '0.6';
  fireKey(k, true);
}
function ku(el, key, evt) {
  if (evt) { evt.preventDefault(); evt.stopPropagation(); }
  const k = key || el.dataset.key;
  el.style.opacity = '';
  fireKey(k, false);
}

// ── iOS keyboard ─────────────────────────────────────────────
let iosInp = null;

// Float entire controls above keyboard when it opens
if (window.visualViewport) {
  const ctrl = document.getElementById('controls');
  const reposition = () => {
    const kbHeight = window.innerHeight - window.visualViewport.height;
    if (kbHeight > 80) {
      // Keyboard is open — fix controls above it
      ctrl.style.position = 'fixed';
      ctrl.style.bottom = kbHeight + 'px';
      ctrl.style.left = '0';
      ctrl.style.right = '0';
      ctrl.style.zIndex = '300';
    } else {
      // Keyboard closed — restore to normal flex flow
      ctrl.style.position = '';
      ctrl.style.bottom = '';
      ctrl.style.left = '';
      ctrl.style.right = '';
      ctrl.style.zIndex = '';
    }
  };
  window.visualViewport.addEventListener('resize', reposition);
  window.visualViewport.addEventListener('scroll', reposition);
}

function toggleKB() {
  if (iosInp) { iosInp.blur(); return; }
  // Use input type=text with attributes that suppress iOS accessory bar
  iosInp = document.createElement('input');
  iosInp.type = 'text';
  iosInp.setAttribute('autocomplete', 'off');
  iosInp.setAttribute('autocorrect', 'off');
  iosInp.setAttribute('autocapitalize', 'none');
  iosInp.setAttribute('spellcheck', 'false');
  iosInp.setAttribute('inputmode', 'text');
  iosInp.style.cssText = 'position:fixed;top:-999px;left:0;width:1px;height:1px;opacity:0;font-size:16px;border:none;outline:none;';
  iosInp.oninput = e => {
    [...e.target.value].forEach(c => { fireKey(c,true); fireKey(c,false); });
    iosInp.value = '';
  };
  iosInp.onkeydown = e => {
    if (e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Escape') {
      fireKey(e.key, true);
      e.preventDefault();
    }
  };
  iosInp.onkeyup = e => {
    if (e.key === 'Backspace' || e.key === 'Enter' || e.key === 'Escape') {
      fireKey(e.key, false);
    }
  };
  iosInp.onblur = () => {
    setTimeout(() => {
      try { document.body.removeChild(iosInp); } catch(e) {}
      iosInp = null;
      // Restore controls to normal flow
      const ctrl = document.getElementById('controls');
      ctrl.style.position = '';
      ctrl.style.bottom = '';
      ctrl.style.left = '';
      ctrl.style.right = '';
      ctrl.style.zIndex = '';
    }, 200);
  };
  document.body.appendChild(iosInp);
  iosInp.focus();
}

// ── F-key scroll ─────────────────────────────────────────────
(function(){
  const s = document.getElementById('fscroll');
  let sx=0, ss=0;
  s.addEventListener('touchstart', e=>{sx=e.touches[0].clientX; ss=s.scrollLeft;},{passive:true});
  s.addEventListener('touchmove', e=>{
    const dx=sx-e.touches[0].clientX;
    if(Math.abs(dx)>5){s.scrollLeft=ss+dx; e.preventDefault();}
  },{passive:false});
})();

// ── ZIP utils ────────────────────────────────────────────────
const enc = s => new TextEncoder().encode(s);

function crc32(d) {
  let c=0xFFFFFFFF;
  for(let i=0;i<d.length;i++){c^=d[i];for(let j=0;j<8;j++)c=(c>>>1)^(c&1?0xEDB88320:0);}
  return(c^0xFFFFFFFF)>>>0;
}
function concat(arr) {
  const o=new Uint8Array(arr.reduce((s,a)=>s+a.length,0));
  let i=0; for(const a of arr){o.set(a,i);i+=a.length;} return o;
}
function mkLH(name,data,offset) {
  const nb=enc(name),crc=crc32(data),lh=new Uint8Array(30+nb.length);
  const v=new DataView(lh.buffer);
  v.setUint32(0,0x04034b50,true);v.setUint16(4,20,true);
  v.setUint32(14,crc,true);v.setUint32(18,data.length,true);v.setUint32(22,data.length,true);
  v.setUint16(26,nb.length,true);lh.set(nb,30);
  const cd=new Uint8Array(46+nb.length);const cv=new DataView(cd.buffer);
  cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);
  cv.setUint32(16,crc,true);cv.setUint32(20,data.length,true);cv.setUint32(24,data.length,true);
  cv.setUint16(28,nb.length,true);cv.setUint32(42,offset,true);cd.set(nb,46);
  return {lh,data,cd};
}
function buildZip(files) {
  const entries=[],cds=[];let off=0;
  for(const f of files){
    const d=f.data instanceof Uint8Array?f.data:new Uint8Array(f.data);
    const{lh,data,cd}=mkLH(f.name,d,off);
    entries.push(lh,data);cds.push(cd);off+=lh.length+data.length;
  }
  const cdB=concat(cds),eocd=new Uint8Array(22),ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(8,files.length,true);
  ev.setUint16(10,files.length,true);ev.setUint32(12,cdB.length,true);ev.setUint32(16,off,true);
  return concat([...entries,cdB,eocd]);
}
function appendToZip(zip,files) {
  const v=new DataView(zip.buffer,zip.byteOffset,zip.byteLength);
  let ei=-1;for(let i=zip.length-22;i>=0;i--)if(v.getUint32(i,true)===0x06054b50){ei=i;break;}
  const cnt=v.getUint16(ei+8,true),csz=v.getUint32(ei+12,true),coff=v.getUint32(ei+16,true);
  const lps=[],cdps=[];let ao=coff;
  for(const f of files){
    const d=f.data instanceof Uint8Array?f.data:new Uint8Array(f.data);
    const{lh,data,cd}=mkLH(f.name,d,ao);
    lps.push(lh,data);cdps.push(cd);ao+=lh.length+data.length;
  }
  const ecd=zip.subarray(coff,coff+csz),ncd=concat(cdps),ne=new Uint8Array(22),nv=new DataView(ne.buffer);
  nv.setUint32(0,0x06054b50,true);nv.setUint16(8,cnt+files.length,true);
  nv.setUint16(10,cnt+files.length,true);nv.setUint32(12,csz+ncd.length,true);nv.setUint32(16,ao,true);
  return concat([zip.subarray(0,coff),...lps,ecd,ncd,ne]);
}
function toDos83(n){const c=n.replace(/\\/g,'/').split('/').pop().split('.')[0].replace(/[^A-Za-z0-9]/g,'').toUpperCase();return c.length<=8?c:c.slice(0,6)+'~1';}
function pickExe(ns){return ns.filter(n=>!/setup|install|config|patch|update|uninst/i.test(n))[0]||ns[0];}
function dosConf(ae){return`[sdl]\nautolock=false\n[dosbox]\nmachine=svga_s3\nmemsize=16\n[cpu]\ncore=auto\ncputype=auto\ncycles=auto\n[render]\nframeskip=0\naspect=false\nscaler=none\n[sblaster]\nsbtype=sb16\nsbbase=220\nirq=7\ndma=1\nhdma=5\noplmode=auto\noplrate=44100\n[mixer]\nnosound=false\nrate=44100\n${ae}`;}

async function ensureJsdosBundle(zip) {
  const v=new DataView(zip.buffer,zip.byteOffset,zip.byteLength);
  let ei=-1;for(let i=zip.length-22;i>=0;i--)if(v.getUint32(i,true)===0x06054b50){ei=i;break;}
  if(ei<0)throw new Error('Not a valid ZIP');
  const cnt=v.getUint16(ei+8,true),coff=v.getUint32(ei+16,true);
  const dec=new TextDecoder();const names=[];let pos=coff;
  for(let i=0;i<cnt;i++){
    if(v.getUint32(pos,true)!==0x02014b50)break;
    const nl=v.getUint16(pos+28,true),xl=v.getUint16(pos+30,true),cl=v.getUint16(pos+32,true);
    names.push(dec.decode(zip.subarray(pos+46,pos+46+nl)).toLowerCase());
    pos+=46+nl+xl+cl;
  }
  if(names.includes('.jsdos/dosbox.conf'))return zip;
  const exes=names.filter(n=>/\.(exe|com|bat)$/.test(n));
  const picked=exes.length?pickExe(exes):null;
  let ae='[autoexec]\nmount c .\nc:\n';
  if(picked){const p=picked.split('/');ae+=p.length>1?`cd ${toDos83(p[0])}\n${p.at(-1).toUpperCase()}\n`:picked.toUpperCase()+'\n';}
  return appendToZip(zip,[{name:'.jsdos/dosbox.conf',data:enc(dosConf(ae))}]);
}
function buildBundleFromExe(d,n){return buildZip([{name:n,data:d},{name:'.jsdos/dosbox.conf',data:enc(dosConf(`[autoexec]\nmount c .\nc:\n${n.toUpperCase()}\n`))}]);}
function buildBundleFromFloppy(d){return buildZip([{name:'floppy.img',data:d},{name:'.jsdos/dosbox.conf',data:enc(dosConf('[autoexec]\nimgmount a floppy.img -t floppy\na:\n'))}]);}
</script>
