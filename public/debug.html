<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Layout Debug</title>
<style>
body { margin: 0; padding: 0; font-family: monospace; font-size: 14px; background: #000; color: #0f0; }
#game { background: #00f; display: block; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: #f00; color: #fff; padding: 10px; z-index: 999; }
#info { padding: 8px; }
</style>
</head>
<body>
<div id="game">
  <div id="info">Loading measurements...</div>
</div>
<div id="controls">
  CONTROLS HERE — can you see this red bar?
</div>
<script>
const ctrl = document.getElementById('controls');
const game = document.getElementById('game');
const info = document.getElementById('info');

function measure() {
  const ctrlH = ctrl.offsetHeight;
  const winH = window.innerHeight;
  const vvH = window.visualViewport ? window.visualViewport.height : 'n/a';
  
  // Set game height to fill above controls
  game.style.height = (winH - ctrlH) + 'px';
  
  info.innerHTML = [
    'window.innerHeight: ' + winH,
    'visualViewport.height: ' + vvH,
    'controls height: ' + ctrlH,
    'game height set to: ' + (winH - ctrlH) + 'px',
    'screen.height: ' + screen.height,
    'devicePixelRatio: ' + window.devicePixelRatio,
  ].join('<br>');
}

measure();
window.addEventListener('resize', measure);
if (window.visualViewport) window.visualViewport.addEventListener('resize', measure);
</script>
</body>
</html>
